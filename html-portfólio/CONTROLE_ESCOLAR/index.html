<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Controle Escolar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
  <body>
    <main>
        <div class="header-main">
            <h1>Lista de alunos</h1>
            <div>
                <button type="button" class="btn btn-primary" data-bs-target="#modalCadastro" data-bs-toggle="modal">Cadastrar aluno</button>
                <button type="button" class="btn btn-primary" id="btnDetalhesTurma">Detalhes da turma</button>
            </div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Nota</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="listaAlunos"></tbody>
        </table>
    </main>

    <!-- Modal cadastro -->
    <div class="modal" tabindex="-1" id="modalCadastro">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Cadastro</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form method="post" id="cadastroAluno">
                        <div>
                            <label for="nome" class="form-label">Nome do aluno</label>
                            <input type="text" class="form-control" id="nome" placeholder="Flávio Inocêncio" required>
                        </div>
                        <div>
                            <label for="idade" class="form-label">Idade do aluno</label>
                            <input type="number" class="form-control" id="idade" placeholder="16" required>
                        </div>
                        <div>
                            <label for="nota" class="form-label">Nota do aluno</label>
                            <input type="text" class="form-control" id="nota" placeholder="10.0" required>
                        </div>
                        <div class="modal-footer">
                            <button type="submit" class="btn btn-primary">Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal detalhes aluno -->
    <div class="modal" tabindex="-1" id="modalDetalhes">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes do aluno</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Nome</th>
                                <th>Idade</th>
                                <th>Nota</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="detalhesAluno"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal detalhes turma -->
    <div class="modal" tabindex="-1" id="modalDetalhesTurma">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Detalhes da turma</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Total de alunos</th>
                                <th>Média da turma</th>
                                <th>Aprovados</th>
                                <th>Reprovados</th>
                            </tr>
                        </thead>
                        <tbody id="detalhesTurma"></tbody>
                    </table>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
